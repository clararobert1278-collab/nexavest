<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A0F1E" />
    <meta name="description" content="Global Investment Platform — Earn consistent returns with professionally managed portfolios." />

    <!-- Security headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- Open Graph (for sharing on WhatsApp, Telegram, etc.) -->
    <meta property="og:title" content="NexaVest — Global Investment Platform" />
    <meta property="og:description" content="Join 14,000+ investors from 150+ countries. Earn up to 40% ROI." />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <title>NexaVest — Global Investment Platform</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0A0F1E;
        color: #F1F5F9;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100vh; }

      /* Loading screen */
      #loading {
        position: fixed; inset: 0;
        background: #0A0F1E;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.5s;
      }
      #loading h1 {
        font-size: 32px; font-weight: 800;
        background: linear-gradient(135deg, #1a56db, #0ea5e9);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 16px;
      }
      #loading p { color: #64748b; font-size: 14px; }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid #1e2d4a;
        border-top-color: #1a56db;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Loading screen (hidden once React loads) -->
    <div id="loading">
      <div class="spinner"></div>
      <h1>NexaVest</h1>
      <p>Loading your investment platform...</p>
    </div>

    <div id="root"></div>

    <script>
      // Hide loading screen once React mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loading = document.getElementById('loading');
          if (loading) {
            loading.style.opacity = '0';
            setTimeout(function() { loading.style.display = 'none'; }, 500);
          }
        }, 800);
      });
    </script>
  </body>
</html>
